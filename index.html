<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

:root {
  --ink: #0b2447;
  --muted: #516178;
  --line: rgba(13, 32, 54, 0.18);
  --panel: rgba(255,255,255,0.92);
  --panel2: rgba(255,255,255,0.98);
  --accent: #1e5eff;
  --accent2:#0aa7ff;
  --shadow: 0 18px 45px rgba(0,0,0,0.18);
}

html, body { height: 100%; margin: 0; }
#map { height: 100%; width: 100%; }

/* panneau */
.panel {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 9999;

  width: 360px;
  padding: 14px;

  background: var(--panel);
  border-radius: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--line);
  backdrop-filter: blur(10px);

  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: #222;
}

.panel.min {
  width: 54px;
  padding: 10px;
}

.panel .head {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.panel .title {
  font-size: 14px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: 0.2px;
  line-height: 1.15;
}

.panel.min .title,
.panel.min .content {
  display:none;
}

.iconbtn {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--panel2);
  cursor: pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: transform .15s ease, border-color .15s ease;
}

.iconbtn:hover {
  transform: translateY(-1px);
  border-color: rgba(30,94,255,0.35);
}

.iconbtn svg {
  width: 18px;
  height: 18px;
  fill: var(--ink);
}

.section {
  padding: 10px 10px;
  border: 1px solid var(--line);
  background: var(--panel2);
  border-radius: 12px;
}

.lbl {
  font-weight: 700;
  color: var(--muted);
  font-size: 12px;
  margin: 8px 0 6px;
}

select {
  width: 100%;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid rgba(13,32,54,0.18);
  background: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: #111;
  outline: none;
}

select:focus {
  border-color: rgba(30,94,255,0.55);
  box-shadow: 0 0 0 3px rgba(30,94,255,0.14);
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid rgba(30,94,255,0.22);
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  font-weight: 800;
  cursor: pointer;
}

.btn:active {
  transform: translateY(1px);
}

.count {
  flex: 1;
  padding: 9px 10px;
  border-radius: 10px;
  background: rgba(30,94,255,0.10);
  color: var(--ink);
  font-weight: 900;
  text-align: center;
  border: 1px solid rgba(30,94,255,0.20);
}

/* labels permanents */
.leaflet-tooltip.lbl {
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(0,0,0,0.25);
  border-radius: 6px;
  padding: 2px 6px;
  font-weight: 700;
  font-size: 11px;
  color: #111;
  box-shadow: 0 4px 14px rgba(0,0,0,0.12);
}
</style>
</head>

<body>
<div id="map"></div>

<div id="panel" class="panel">
  <div class="head">
    <div class="title">Centres de vote 2025</div>

    <button id="toggleBtn" class="iconbtn" title="minimiser / afficher">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 10h10v2H7v-2zm0 4h10v2H7v-2zM7 6h10v2H7V6z"></path>
      </svg>
    </button>
  </div>

  <div class="content section">
    <div class="lbl">Département</div>
    <select id="depSelect"><option value="__ALL__">Tous</option></select>

    <div class="lbl">Commune</div>
    <select id="comSelect"><option value="__ALL__">Toutes</option></select>

    <div class="lbl">Section communale</div>
    <select id="secSelect"><option value="__ALL__">Toutes</option></select>

    <div class="row">
      <button class="btn" id="resetBtn">reset</button>
      <div class="count" id="countBox">0</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

const map = L.map('map').setView([18.955420883333332, -72.83014525030582], 7);

const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '&copy; OpenStreetMap'
}).addTo(map);

const esri = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: 'Esri'
});

L.control.layers({ "plan (OSM)": osm, "satellite (Esri)": esri }, null, {collapsed:false}).addTo(map);

const cluster = L.markerClusterGroup();
map.addLayer(cluster);

const depSelect = document.getElementById("depSelect");
const comSelect = document.getElementById("comSelect");
const secSelect = document.getElementById("secSelect");
const countBox  = document.getElementById("countBox");

function uniqSorted(arr) {
  return Array.from(new Set(arr.filter(v => v && v.trim() !== ""))).sort((a,b)=>a.localeCompare(b));
}
function sel(v) { return (v === "__ALL__") ? "" : v; }

function setOptions(selectEl, values, allLabel) {
  const prev = selectEl.value || "__ALL__";
  selectEl.innerHTML = "";

  const opt0 = document.createElement("option");
  opt0.value="__ALL__"; opt0.textContent=allLabel;
  selectEl.appendChild(opt0);

  for (const v of values) {
    const o = document.createElement("option");
    o.value = v; o.textContent = v;
    selectEl.appendChild(o);
  }

  const exists = Array.from(selectEl.options).some(o => o.value === prev);
  selectEl.value = exists ? prev : "__ALL__";
}

function possibleCommunes(dep) {
  const subset = dep ? pts.filter(p => p.dep === dep) : pts;
  return uniqSorted(subset.map(p => p.com));
}

function possibleSections(dep, com) {
  let subset = pts;
  if (dep) subset = subset.filter(p => p.dep === dep);
  if (com) subset = subset.filter(p => p.com === com);
  return uniqSorted(subset.map(p => p.sec));
}

function applyCascadeOptions() {
  const dep = sel(depSelect.value);
  setOptions(comSelect, possibleCommunes(dep), "Toutes");
  const com = sel(comSelect.value);
  setOptions(secSelect, possibleSections(dep, com), "Toutes");
}

// labels visibles uniquement si section sélectionnée
const MAX_LABELS = 250;

function applyFilter() {
  const dep = sel(depSelect.value);
  const com = sel(comSelect.value);
  const sec = sel(secSelect.value);

  cluster.clearLayers();
  const bounds = [];

  // compter points gardés
  let kept = 0;
  for (const p of pts) {
    const ok = (!dep || p.dep === dep) &&
               (!com || p.com === com) &&
               (!sec || p.sec === sec);
    if (ok) kept++;
  }
  countBox.textContent = kept.toString();

  // ✅ labels seulement si section communale sélectionnée
  const showLabels = (sec && kept <= MAX_LABELS);

  for (const p of pts) {
    const ok = (!dep || p.dep === dep) &&
               (!com || p.com === com) &&
               (!sec || p.sec === sec);
    if (!ok) continue;

    const mk = L.marker([p.lat, p.lon]).bindPopup(p.popup);

    if (showLabels) {
      mk.bindTooltip(p.tip, {
        permanent: true,
        direction: "top",
        offset: [0, -10],
        opacity: 0.95,
        className: "lbl"
      }).openTooltip();
    } else {
      mk.bindTooltip(p.tip); // survol
    }

    cluster.addLayer(mk);
    bounds.push([p.lat, p.lon]);
  }

  if (bounds.length > 0) {
    map.fitBounds(L.latLngBounds(bounds), {padding:[40,40]});
  }
}

function onDepChange() {
  comSelect.value="__ALL__";
  secSelect.value="__ALL__";
  applyCascadeOptions();
  applyFilter();
}

function onComChange() {
  secSelect.value="__ALL__";
  applyCascadeOptions();
  applyFilter();
}

function onSecChange() {
  applyFilter();
}

function resetAll() {
  depSelect.value="__ALL__";
  comSelect.value="__ALL__";
  secSelect.value="__ALL__";
  applyCascadeOptions();
  applyFilter();
  map.setView([18.955420883333332, -72.83014525030582], 7);
}

// init
setOptions(depSelect, uniqSorted(pts.map(p => p.dep)), "Tous");
applyCascadeOptions();
applyFilter();

// events (pas de recalcul sur zoom, zoom libre)
depSelect.addEventListener("change", onDepChange);
comSelect.addEventListener("change", onComChange);
secSelect.addEventListener("change", onSecChange);
document.getElementById("resetBtn").addEventListener("click", resetAll);

// panneau minimisable
const panel = document.getElementById("panel");
document.getElementById("toggleBtn").addEventListener("click", () => {
  panel.classList.toggle("min");
  setTimeout(() => map.invalidateSize(), 120);
});
</script>
